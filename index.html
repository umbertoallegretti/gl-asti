<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GL Asti - Gaming Lounge</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Exo+2:ital,wght@0,400;0,700;1,600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #7000ff;
            --bg-dark: #0a0a0c;
            --bg-card: #15151a;
            --text-main: #e0e0e0;
            --accent-green: #39ff14;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Exo 2', sans-serif; 
            background-color: var(--bg-dark); 
            color: var(--text-main);
            line-height: 1.6;
        }

        h1, h2, h3, .nav-logo { font-family: 'Rajdhani', sans-serif; text-transform: uppercase; }

        /* --- UI COMPONENTS --- */
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        
        .card {
            background: var(--bg-card);
            border: 1px solid #2d2d35;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .btn {
            background: linear-gradient(45deg, var(--secondary), var(--primary));
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
            width: 100%;
            text-transform: uppercase;
        }

        .btn:hover { transform: scale(1.02); filter: brightness(1.1); }

        /* --- NAVIGATION --- */
        nav {
            background: rgba(10, 10, 12, 0.95);
            padding: 15px 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid var(--primary);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-logo { color: var(--primary); font-size: 1.5rem; font-weight: 800; letter-spacing: 2px; }

        /* --- SECTIONS --- */
        .section { display: none; animation: fadeIn 0.4s ease-out; }
        .section.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- BOOKING GRID --- */
        .grid-options {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 10px;
            margin: 15px 0;
        }

        .option-item {
            border: 1px solid #333;
            padding: 15px;
            text-align: center;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        .option-item.selected {
            border-color: var(--primary);
            background: rgba(0, 242, 255, 0.1);
        }

        /* --- PROFILE & LEVEL --- */
        .level-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            background: var(--secondary);
            font-size: 0.8rem;
            margin-bottom: 10px;
        }

        .client-code {
            font-size: 2rem;
            color: var(--primary);
            letter-spacing: 5px;
            text-align: center;
            margin: 10px 0;
        }
    </style>
</head>
<body>

<nav>
    <div class="nav-logo">GL ASTI</div>
    <div id="user-nav-info"></div>
</nav>

<div class="container">
    <!-- Login / Registrazione -->
    <section id="auth-section" class="section active">
        <div class="card">
            <h2>Accesso Player</h2>
            <input type="email" id="email" placeholder="Email" style="width:100%; padding:10px; margin:10px 0; border-radius:4px; border:1px solid #333; background:#111; color:white;">
            <input type="password" id="password" placeholder="Password" style="width:100%; padding:10px; margin:10px 0; border-radius:4px; border:1px solid #333; background:#111; color:white;">
            <button class="btn" onclick="handleAuth()">Accedi / Registrati</button>
        </div>
    </section>

    <!-- Main Dashboard -->
    <section id="dashboard-section" class="section">
        <div class="card">
            <div id="profile-summary">
                <span class="level-badge" id="player-level">Novice</span>
                <h2 id="player-name">Caricamento...</h2>
                <p>Codice Cliente:</p>
                <div class="client-code" id="display-client-code">----</div>
            </div>
        </div>

        <div class="grid-options">
            <div class="option-item" onclick="showSection('booking-section')">🎮 Prenota</div>
            <div class="option-item" onclick="showSection('tournaments-section')">🏆 Tornei</div>
            <div class="option-item" onclick="showSection('rewards-section')">🎁 Buoni</div>
        </div>
    </section>

    <!-- Prenotazione -->
    <section id="booking-section" class="section">
        <button class="btn" onclick="showSection('dashboard-section')" style="margin-bottom:15px; background: #333;">← Torna Indietro</button>
        <div class="card">
            <h3>Nuova Prenotazione</h3>
            <p>Seleziona Postazione:</p>
            <div class="grid-options" id="station-options">
                <div class="option-item" onclick="selectStation('PS5')">PS5</div>
                <div class="option-item" onclick="selectStation('SIM')">Simulatore</div>
                <div class="option-item" onclick="selectStation('VR')">VR</div>
            </div>
            <p>Durata:</p>
            <div class="grid-options" id="duration-options">
                <div class="option-item" onclick="selectDuration(60)">60 Min</div>
                <div class="option-item" onclick="selectDuration(120)">120 Min</div>
            </div>
            <button class="btn" onclick="confirmBooking()">Conferma Prenotazione</button>
        </div>
    </section>

    <!-- Buoni/Premi -->
    <section id="rewards-section" class="section">
        <button class="btn" onclick="showSection('dashboard-section')" style="margin-bottom:15px; background: #333;">← Torna Indietro</button>
        <h2>I Tuoi Buoni</h2>
        <div id="coupons-list">
            <!-- I buoni verranno iniettati qui -->
            <p style="text-align:center; opacity:0.5;">Nessun buono disponibile al momento.</p>
        </div>
    </section>
</div>

<script>
    // CONFIGURAZIONE SUPABASE
    // Sostituisci con le tue chiavi reali
    const SUPABASE_URL = 'https://tuo-id.supabase.co';
    const SUPABASE_KEY = 'tua-chiave-anon-public';
    const supabase = document.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentUser = null;

    // Gestione Navigazione
    function showSection(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    // Autenticazione (Logica semplificata)
    async function handleAuth() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        const { data, error } = await supabase.auth.signInWithPassword({ email, password });

        if (error) {
            // Se non esiste, prova a registrarlo (Nota: logica semplificata per demo)
            const { data: signUpData, error: signUpError } = await supabase.auth.signUp({ email, password });
            if (signUpError) alert(signUpError.message);
            else alert("Controlla l'email per confermare la registrazione!");
        } else {
            currentUser = data.user;
            loadPlayerData();
            showSection('dashboard-section');
        }
    }

    async function loadPlayerData() {
        const { data: profile } = await supabase
            .from('profiles')
            .select('*')
            .eq('id', currentUser.id)
            .single();

        if (profile) {
            document.getElementById('player-name').innerText = profile.username || 'Player';
            document.getElementById('display-client-code').innerText = profile.client_code;
            document.getElementById('player-level').innerText = calculateLevel(profile.total_hours);
        }
    }

    function calculateLevel(hours) {
        if (hours > 100) return 'Leggenda';
        if (hours > 50) return 'Pro';
        if (hours > 10) return 'Veteran';
        return 'Novice';
    }

    // Esempio logica prenotazione
    let bookingData = { station: '', duration: 0 };

    function selectStation(type) {
        bookingData.station = type;
        // Logic to highlight selection
    }

    function selectDuration(mins) {
        bookingData.duration = mins;
    }

    async function confirmBooking() {
        if (!bookingData.station || !bookingData.duration) return alert("Seleziona tutti i campi");
        
        // Inserimento a DB (Esempio)
        alert(`Prenotazione effettuata per ${bookingData.station}!`);
        showSection('dashboard-section');
    }
</script>

</body>
</html>
