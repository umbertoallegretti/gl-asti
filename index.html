<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GL Asti - Gaming Lounge</title>
    <link rel="stylesheet" href="style.css">
    <!-- Carica Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <nav class="navbar">
        <div class="nav-item" onclick="showSection('home')">Home</div>
        <div class="nav-item" onclick="showSection('booking')">Prenota</div>
        <div class="nav-item" onclick="showSection('leaderboard')">Classifica</div>
        <div id="admin-link" class="nav-item" style="display:none;" onclick="showSection('admin')">Admin</div>
        <div class="nav-item" onclick="showSection('profile')">Profilo</div>
    </nav>

    <main id="main-content">
        <!-- Sezione Home/Login -->
        <section id="sec-home" class="page-section">
            <div id="login-welcome">
                <h1>Benvenuto alla GL Asti</h1>
                <p>Verifica della sessione in corso...</p>
            </div>
        </section>

        <!-- Sezione Prenotazione -->
        <section id="sec-booking" class="page-section" style="display:none;">
            <h2>Prenota la tua sessione</h2>
            <div class="card">
                <button class="btn-popup" onclick="openGamePopup()">🎮 Scegli Gioco</button>
                <p id="selected-game-display">Nessun gioco selezionato</p>
                <div id="price-preview">Prezzo: -- €</div>
            </div>
        </section>

        <!-- Altre sezioni (vuote per ora) -->
        <section id="sec-leaderboard" class="page-section" style="display:none;"><h2>Classifica</h2></section>
        <section id="sec-admin" class="page-section" style="display:none;"><h2>Pannello Admin</h2></section>
        <section id="sec-profile" class="page-section" style="display:none;"><h2>Il tuo Profilo</h2></section>
    </main>

    <script src="app.js"></script>
</body>
</html>
