<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gaming Lounge Asti | Hub</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind & FontAwesome -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --neon-cyan: #00f3ff;
            --neon-magenta: #ff00ff;
            --bg-dark: #0a0a0c;
            --card-bg: rgba(20, 20, 25, 0.8);
        }

        body {
            font-family: 'Exo 2', sans-serif;
            background-color: var(--bg-dark);
            color: white;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(0, 243, 255, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(255, 0, 255, 0.05) 0%, transparent 40%);
        }

        .font-rajdhani { font-family: 'Rajdhani', sans-serif; }

        /* Effetti Cyberpunk */
        .glass-panel {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 243, 255, 0.2);
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
        }

        .neon-border-hover:hover {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.3);
        }

        .btn-primary {
            background: linear-gradient(45deg, var(--neon-cyan), #00a8ff);
            color: black;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 20px var(--neon-cyan);
        }

        /* Animazione Caricamento */
        .loader {
            border: 3px solid rgba(0, 243, 255, 0.1);
            border-radius: 50%;
            border-top: 3px solid var(--neon-cyan);
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--neon-cyan); }
    </style>
</head>
<body class="min-h-screen pb-12">

    <!-- Header / Navigation -->
    <nav class="sticky top-0 z-50 glass-panel border-b border-cyan-500/30 px-6 py-4 mb-8">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-cyan-500 rounded-lg flex items-center justify-center shadow-[0_0_15px_rgba(0,243,255,0.5)]">
                    <i class="fas fa-gamepad text-black text-xl"></i>
                </div>
                <h1 class="text-2xl font-black font-rajdhani tracking-tighter uppercase italic">
                    Gaming Lounge <span class="text-cyan-400">Asti</span>
                </h1>
            </div>
            
            <div id="nav-user" class="hidden flex items-center gap-6">
                <span id="user-points" class="text-sm font-bold text-cyan-400 bg-cyan-400/10 px-3 py-1 rounded-full border border-cyan-400/20">
                    <i class="fas fa-clock mr-2"></i><span id="hours-display">0</span>h
                </span>
                <button onclick="logout()" class="text-gray-400 hover:text-red-400 transition-colors">
                    <i class="fas fa-power-off text-xl"></i>
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4">
        
        <!-- Login Section (Visible by default) -->
        <section id="auth-section" class="max-w-md mx-auto mt-20">
            <div class="glass-panel p-8 rounded-2xl border-t-4 border-t-cyan-500">
                <h2 class="text-3xl font-black font-rajdhani mb-6 text-center">ACCESSO PLAYER</h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs uppercase text-gray-400 mb-1 ml-1">Email</label>
                        <input type="email" id="email" class="w-full bg-black/50 border border-gray-700 rounded-lg px-4 py-3 focus:border-cyan-500 outline-none transition-all">
                    </div>
                    <div>
                        <label class="block text-xs uppercase text-gray-400 mb-1 ml-1">Password</label>
                        <input type="password" id="password" class="w-full bg-black/50 border border-gray-700 rounded-lg px-4 py-3 focus:border-cyan-500 outline-none transition-all">
                    </div>
                    <button onclick="login()" id="login-btn" class="w-full btn-primary py-4 rounded-lg mt-4 flex justify-center items-center">
                        Entra nel Sistema
                    </button>
                </div>
            </div>
        </section>

        <!-- Player Dashboard (Hidden) -->
        <section id="dashboard" class="hidden space-y-8">
            <!-- Stats Grid -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="glass-panel p-6 rounded-xl flex items-center gap-4">
                    <div class="p-4 bg-cyan-500/10 rounded-lg text-cyan-400"><i class="fas fa-user-tag text-2xl"></i></div>
                    <div>
                        <p class="text-gray-400 text-sm uppercase">Codice Cliente</p>
                        <p id="client-code" class="text-2xl font-bold font-rajdhani tracking-widest text-white">----</p>
                    </div>
                </div>
                <!-- Altre card statistiche... -->
            </div>

            <!-- Main Actions -->
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <!-- Booking Form -->
                <div class="lg:col-span-2 glass-panel p-8 rounded-2xl">
                    <h3 class="text-2xl font-bold font-rajdhani mb-6 flex items-center gap-3">
                        <i class="fas fa-calendar-plus text-cyan-400"></i> PRENOTA POSTAZIONE
                    </h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <!-- Input per la prenotazione (Data, Ora, Postazione) -->
                        <!-- ... -->
                    </div>
                </div>

                <!-- Leaderboard / Tornei -->
                <div class="glass-panel p-6 rounded-2xl">
                    <h3 class="text-xl font-bold font-rajdhani mb-4">TOP PLAYERS</h3>
                    <div id="leaderboard-list" class="space-y-4">
                        <!-- Caricamento dinamico dei top player -->
                    </div>
                </div>
            </div>
        </section>

        <!-- Admin Panel (Hidden) -->
        <section id="admin-panel" class="hidden mt-12 glass-panel p-8 rounded-2xl border-t-4 border-t-magenta-500">
            <!-- Gestione Prenotazioni e Ore... -->
        </section>

    </main>

    <script>
        // Configurazione Supabase (Sostituisci con i tuoi dati reali)
        const SUPABASE_URL = 'https://tua-url.supabase.co';
        const SUPABASE_KEY = 'tua-chiave-anon-public';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Funzione Login Migliorata
        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('login-btn');

            btn.innerHTML = '<div class="loader"></div>';
            btn.disabled = true;

            const { data, error } = await supabase.auth.signInWithPassword({ email, password });

            if (error) {
                alert("Errore: " + error.message);
                btn.innerHTML = 'Entra nel Sistema';
                btn.disabled = false;
            } else {
                checkUserSession();
            }
        }

        // Gestione Sessione e UI
        async function checkUserSession() {
            const { data: { user } } = await supabase.auth.getUser();
            
            if (user) {
                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                document.getElementById('nav-user').classList.remove('flex', 'hidden');
                document.getElementById('nav-user').classList.add('flex');
                
                // Carica dati profilo (ore, codice cliente)
                loadUserData(user.id);
            }
        }

        async function loadUserData(userId) {
            const { data, error } = await supabase
                .from('profiles')
                .select('*')
                .eq('id', userId)
                .single();

            if (data) {
                document.getElementById('hours-display').innerText = data.ore_gioco;
                document.getElementById('client-code').innerText = data.client_code || 'N/D';
            }
        }

        async function logout() {
            await supabase.auth.signOut();
            window.location.reload();
        }

        // Esegui al caricamento
        window.onload = checkUserSession;
    </script>
</body>
</html>
